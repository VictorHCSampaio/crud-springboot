spring.profiles.active=${APP_PROFILE:dev}

# --- Configura??es de HTTPS/TLS (Req. 3.1) ---
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=crud-produtos

# Porta HTTP usada apenas para redirect ? HTTPS (Req. 3.2)
server.http.port=8080

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# Spring Boot serve os arquivos est?ticos do frontend (elimina cross-origin)
# Acesse: https://localhost:8443/login.html
spring.web.resources.static-locations=file:../crud-springboot-front/,classpath:/static/
security.password.bcrypt.strength=12
security.auth.max-attempts=5
security.auth.lock-duration-minutes=15
security.auth.totp.issuer=crud-produtos
# Configura??es de Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Configura??es do sistema de email
app.mail.from=${MAIL_FROM:sampaiov917@gmail.com}
app.mail.reset.subject=Recupera??o de Senha - CRUD Produtos
