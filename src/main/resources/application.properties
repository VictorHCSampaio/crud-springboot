spring.profiles.active=${APP_PROFILE:local}
server.servlet.session.timeout=30m
security.password.bcrypt.strength=12
security.auth.max-attempts=5
security.auth.lock-duration-minutes=15
security.auth.totp.issuer=crud-produtos
# Configurações de Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Configurações do sistema de email
app.mail.from=${MAIL_FROM:sampaiov917@gmail.com}
app.mail.reset.subject=Recuperação de Senha - CRUD Produtos
