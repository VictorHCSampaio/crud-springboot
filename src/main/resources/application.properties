spring.profiles.active=${APP_PROFILE:local}

# --- Configuracoes de HTTPS/TLS (Req. 3.1) ---
# Para producao (descomente quando for usar)
# server.ssl.enabled=true
# server.ssl.key-store-type=PKCS12
# server.ssl.key-store=/caminho/para/keystore.p12
# server.ssl.key-store-password=sua-senha
# server.ssl.key-alias=tomcat
# server.port=8443

# Porta HTTP usada apenas para redirect a HTTPS (Req. 3.2)
server.http.port=8080

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# Secure apenas com HTTPS ativo; em HTTP (perfil local) o cookie continua transmitivel sem TLS
server.servlet.session.cookie.secure=${server.ssl.enabled:false}
server.servlet.session.cookie.same-site=lax

# Spring Boot serve os arquivos estaticos do frontend (elimina cross-origin)
# Acesse: https://localhost:8443/login.html
spring.web.resources.static-locations=file:../front-end-crudproduto/,classpath:/static/
security.password.bcrypt.strength=12
security.auth.max-attempts=5
security.auth.lock-duration-minutes=15
security.auth.totp.issuer=crud-produtos
# Configuracoes de Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Configuracoes do sistema de email
app.mail.from=${MAIL_FROM:sampaiov917@gmail.com}
app.mail.reset.subject=Recuperacao de Senha - CRUD Produtos
