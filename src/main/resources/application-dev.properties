spring.application.name=crud-produtos

# --- HTTPS (Req. 3.1 / 3.2): gere o keystore com scripts/generate-dev-keystore.sh ---
server.port=8443
server.http.port=8080
server.ssl.enabled=true
server.ssl.key-store=file:${SSL_KEYSTORE_FILE:certs/dev-keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEYSTORE_ALIAS:tomcat}

# JDBC: SPRING_DATASOURCE_URL sobrescreve (ex.: jdbc:postgresql://...?sslmode=require)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/crud?sslMode=${MYSQL_SSL_MODE:PREFERRED}}
spring.datasource.username=${PG_USER}
spring.datasource.password=${PG_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
