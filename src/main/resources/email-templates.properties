# Template de email para recuperaçăo de senha
app.mail.reset.template=Olá %s,\n\nVocę solicitou a recuperaçăo de senha para sua conta no CRUD Produtos.\n\nPara redefinir sua senha, use o seguinte código:\n\n%s\n\nEste código é válido por 30 minutos.\n\nSe vocę năo solicitou esta recuperaçăo, ignore este email.\n\nAtenciosamente,\nEquipe CRUD Produtos
